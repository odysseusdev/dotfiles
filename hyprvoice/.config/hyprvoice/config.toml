# Audio Recording Configuration
[recording]
  sample_rate = 16000
  channels = 1
  format = "s16"
  buffer_size = 8192
  device = ""
  channel_buffer_size = 30
  timeout = "5m0s"

# Speech Transcription Configuration
[transcription]
  provider = "whisper-cpp"
  language = "en"
  model = "medium.en"
  streaming = false
  threads = 0

# LLM Post-Processing Configuration
[llm]
  enabled = false

  [llm.post_processing]
    remove_stutters = false
    add_punctuation = false
    fix_grammar = false
    remove_filler_words = false

  [llm.custom_prompt]
    enabled = false

# Text Injection Configuration
[injection]
  backends = ["ydotool", "wtype", "clipboard"]
  ydotool_timeout = "30s"
  wtype_timeout = "10s"
  clipboard_timeout = "5s"

# Desktop Notification Configuration
[notifications]
  enabled = true
  type = "desktop"
