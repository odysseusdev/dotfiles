# prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# true colour passthrough
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# nvim compatibility
set -sg escape-time 10
set -g focus-events on

# bigger scrollback
set -g history-limit 50000

# mouse
set -g mouse on

# indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# don't exit tmux when the last session's window closes
set -g detach-on-destroy off

# reload config
bind r source-file ~/.config/tmux/tmux.conf \

# splits that keep the current directory
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
unbind %
bind h split-window -v -c "#{pane_current_path}"

# new window in current dir
bind c new-window -c "#{pane_current_path}"

# vi-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Escape send-keys -X cancel

# resize panes
bind -r H resize-pane -L 4
bind -r J resize-pane -D 4
bind -r K resize-pane -U 4
bind -r L resize-pane -R 4

# open a thin claude code pane on the right
bind a split-window -h -l 25% -c "#{pane_current_path}" "claude"

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# nvim-aware pane navigation
set -g @plugin 'christoomey/vim-tmux-navigator'

# session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# system clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# fuzzy session manager
set -g @plugin 'omerxx/tmux-sessionx'

# url / path picker
set -g @plugin 'wfxr/tmux-fzf-url'

# general fzf menu
set -g @plugin 'sainnhe/tmux-fzf'

# theme
set -g @plugin 'catppuccin/tmux#v2.3.0'

# resurrect: also restore pane contents + nvim sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# continuum: auto-save every 15 min, auto-restore on start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# sessionx: bind to prefix + o, sized popup, zoxide jumps
set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-filter-current 'false'
set -g @sessionx-custom-paths '~/data/repos,~/data/work,~/Documents/Repos'

# fzf-url: prefix + u to grab links from the pane
set -g @fzf-url-bind 'u'
set -g @fzf-url-history-limit '2000'

# theme
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text " #{b:pane_current_path}"
set -g @catppuccin_window_current_text " #{b:pane_current_path}"

# keep the bar lean
set -g status-left ""
set -g status-right "#{?client_prefix,#[fg=#{@thm_red}]󰜈 ,}#{E:@catppuccin_status_session}"
set -g status-left-length 100
set -g status-right-length 100

run '~/.config/tmux/plugins/tpm/tpm'
